# Tool-Risk-Inventory
#
# Klassifikation, welche Tools mit welcher Approval-Policy laufen dürfen.
# Wird vor jedem Tool-Call vom Orchestrator gegen den geplanten Aufruf
# gematcht. Erste Match gewinnt; nicht gematchte Tools fallen auf
# `default` zurück (fail-closed).
#
# Schema und Vertrag siehe ADR-0015.
#
# Risk-Klassen:
#   low          — lokal, reversibel, abgeschlossen (file_read, grep)
#   medium       — lokal mit Side-Effect (file_write innerhalb worktree,
#                  shell_exec ohne Netzwerk/State-Modifikation)
#   high         — außenwirksam, nicht-trivial (gh issue comment, slack)
#   irreversible — außenwirksam, schwer rückgängig (git push, gh pr merge)
#
# Approval-Modi:
#   never         — kein HITL-Gate
#   required      — ApprovalRequest ziehen, Run pausiert bis Freigabe
#   policy_gated  — disjunktive Kriterien aus ADR-0012 zusätzlich werten

version: 2
updated: 2026-04-26

tools:
  # Lese-/Such-Operationen (low)
  - pattern: "file_read"
    risk: low
    approval: never

  - pattern: "file_search"
    risk: low
    approval: never

  - pattern: "grep"
    risk: low
    approval: never

  # Lokale Schreib-Operationen (medium)
  - pattern: "file_write"
    risk: medium
    approval: never
    constraint: "path within worktree"

  - pattern: "file_edit"
    risk: medium
    approval: never
    constraint: "path within worktree"

  # shell_* Pattern: V0.3.0-Split gegenüber dem alten breiten shell_exec
  # (siehe ADR-0015 Abschnitt "shell_*-Splitting"). Adapter klassifizieren
  # unklare Shell-Befehle übergangsweise als shell_dangerous.
  - pattern: "shell_readonly"
    risk: low
    approval: never
    constraint: "read-only commands only (ls, cat, grep, find without -delete/-exec)"

  - pattern: "shell_worktree_write"
    risk: medium
    approval: never
    constraint: "writes restricted to worktree path"

  - pattern: "shell_network"
    risk: high
    approval: required
    constraint: "any network egress (curl, wget, nc, ssh)"

  - pattern: "shell_dangerous"
    risk: irreversible
    approval: required
    constraint: "destructive or system-modifying (rm, kill, sudo, chmod, mv outside worktree)"

  # Git-Operationen
  - pattern: "git_commit"
    risk: medium
    approval: never

  - pattern: "git_branch"
    risk: low
    approval: never

  - pattern: "git_push"
    risk: irreversible
    approval: required

  - pattern: "git_force_push"
    risk: irreversible
    approval: required

  # GitHub-Operationen (außenwirksam)
  - pattern: "gh_issue_create"
    risk: high
    approval: required

  - pattern: "gh_issue_comment"
    risk: high
    approval: required

  - pattern: "gh_pr_create"
    risk: high
    approval: required

  - pattern: "gh_pr_comment"
    risk: high
    approval: required

  - pattern: "gh_pr_merge"
    risk: irreversible
    approval: required

  - pattern: "gh_*"
    risk: high
    approval: required
    # Catch-all für nicht explizit gelistete gh-Subkommandos.

  # Notification-Side-Effects (außenwirksam)
  - pattern: "slack_post"
    risk: high
    approval: required

  - pattern: "email_send"
    risk: high
    approval: required

  # Web-/Netz-Operationen
  - pattern: "web_fetch"
    risk: low
    approval: never
    constraint: "egress proxy allowlist (ADR-0010)"

  - pattern: "web_search"
    risk: low
    approval: never

# Drift-Detection-Schwelle (F0007): Anteil Default-Hits an gesamten
# Tool-Calls, ab dem eine Digest-Card erzeugt wird. Eigenentscheidung;
# konservativer Startwert.
drift_threshold_pct: 5

# Fail-closed Default für jedes nicht oben gelistete Tool.
default:
  risk: high
  approval: required
